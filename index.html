<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>时轮运转 · 每日一签</title>
<meta property="og:title" content="时轮运转 · 今日运势" />
<meta property="og:description" content="基于藏历时轮历法，每日能量 + 人生进度条" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(160deg,#0d0b1a 0%,#1a1035 40%,#0f0820 100%);
  color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent
}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

.app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:14px 10px 36px}

/* header */
.header{text-align:center;padding:24px 0 16px}
.header .om{font-size:2.4rem;display:block;margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(212,175,55,.4))}
.header h1{
  font-size:1.5rem;font-weight:900;
  background:linear-gradient(135deg,#D4AF37,#F5DEB3,#D4AF37,#C9A227);
  background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShimmer 4s ease infinite;letter-spacing:4px
}
@keyframes goldShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.header .sub{
  font-size:.7rem;color:#8B7355;margin-top:8px;letter-spacing:3px;
  display:flex;align-items:center;justify-content:center;gap:6px
}
.header .sub::before,.header .sub::after{
  content:'';width:24px;height:1px;background:linear-gradient(90deg,transparent,#8B7355)
}
.header .sub::after{background:linear-gradient(90deg,#8B7355,transparent)}

/* mandala ring decoration */
.mandala-ring{
  width:120px;height:120px;margin:0 auto 12px;position:relative;
  display:flex;align-items:center;justify-content:center
}
.mandala-ring svg{width:100%;height:100%;animation:spinSlow 30s linear infinite}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.mandala-center{
  position:absolute;width:50px;height:50px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.3),rgba(212,175,55,.05));
  border:1px solid rgba(212,175,55,.2);display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;animation:pulseGlow 3s ease-in-out infinite
}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 15px rgba(212,175,55,.2)}50%{box-shadow:0 0 30px rgba(212,175,55,.5)}}

/* date card */
.date-card{
  background:linear-gradient(150deg,rgba(212,175,55,.07),rgba(180,130,60,.03),rgba(212,175,55,.04));
  border:1px solid rgba(212,175,55,.15);border-radius:18px;
  padding:20px 20px;text-align:center;margin-bottom:14px;
  position:relative;overflow:hidden
}
.date-card::before{
  content:'';position:absolute;top:-60%;right:-40%;width:240px;height:240px;
  background:radial-gradient(circle,rgba(212,175,55,.06),transparent 70%);pointer-events:none
}
.date-card .solar{font-size:1.15rem;font-weight:700;color:#F5DEB3;letter-spacing:1px}
.date-card .lunar-row{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.lunar-item{
  font-size:.72rem;color:#A08060;padding:3px 10px;border-radius:8px;
  background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.1);
  white-space:nowrap
}
.lunar-item.tibetan{
  color:#C9A227;background:rgba(201,162,39,.08);
  border-color:rgba(201,162,39,.18);font-weight:600
}
.lunar-item.jieqi{color:#DDAA55;border-color:rgba(221,170,85,.15)}

/* life progress */
.section{background:rgba(10,8,25,.82);border:1px solid rgba(212,175,55,.08);border-radius:18px;padding:20px 18px;margin-bottom:14px}
.sec-title{
  font-size:.78rem;font-weight:700;color:#D4AF37;letter-spacing:3px;
  margin-bottom:14px;display:flex;align-items:center;gap:8px
}
.sec-title .dot{
  width:4px;height:14px;background:linear-gradient(#D4AF37,#B8860B);border-radius:2px;
  flex-shrink:0
}
.progress-wrap{margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:#776655;margin-bottom:6px}
.progress-bar{height:22px;background:rgba(255,255,255,.04);border-radius:11px;overflow:hidden;position:relative}
.progress-fill{
  height:100%;border-radius:11px;
  background:linear-gradient(90deg,#D4AF37,#DAa520,#B8860B,#CD853F);
  transition:width 1.8s ease;position:relative
}
.progress-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 30%,rgba(255,245,220,.12) 50%,transparent 70%);
  animation:shimmer 2.5s infinite
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-pct{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:.74rem;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);z-index:2
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-item{
  background:rgba(212,175,55,.03);border:1px solid rgba(212,175,55,.06);
  border-radius:12px;padding:11px 12px;text-align:center
}
.stat-val{font-size:1.05rem;font-weight:800;color:#D4AF37;font-family:'SF Mono',monospace}
.stat-lbl{font-size:.64rem;color:#665544;margin-top:2px;letter-spacing:1px}
.stat-item.warm .stat-val{color:#CD853F}
.stat-item.cool .stat-val{color:#87CEEB}
.stat-item.rose .stat-val{color:#E070A0}

/* huangli */
.yi-ji{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.yi-box,.ji-box{border-radius:14px;padding:14px 16px}
.yi-box{background:rgba(34,160,100,.04);border:1px solid rgba(34,180,110,.12)}
.ji-box{background:rgba(180,80,80,.04);border:1px solid rgba(190,90,90,.12)}
.yiji-title{font-size:.76rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.yiji-title.yes{color:#66DD99}.yiji-title.no{color:#EE8888}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{
  font-size:.7rem;padding:4px 9px;border-radius:8px;white-space:nowrap;line-height:1.4
}
.yi-box .tag{background:rgba(34,180,110,.09);color:#88EEBB}
.ji-box .tag{background:rgba(190,90,90,.09);color:#FFAAAA}

/* fortune */
.stars-row{font-size:1.3rem;letter-spacing:3px;margin-bottom:12px;text-align:center}
.fortune-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.ft-item{
  display:flex;align-items:center;gap:7px;font-size:.74rem;
  padding:9px 11px;background:rgba(212,175,55,.025);border-radius:10px;
  border:1px solid rgba(212,175,55,.05)
}
.ft-icon{font-size:1rem;flex-shrink:0}
.ft-key{color:#776655;min-width:64px;font-size:.7rem}
.ft-val{color:#E8D8A0;font-weight:600;font-size:.72rem}

/* love / beauty special */
.special-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sp-card{
  text-align:center;padding:14px 10px;border-radius:14px;
  border:1px solid rgba(212,175,55,.08)
}
.sp-card.love{background:rgba(230,100,140,.04);border-color:rgba(230,100,140,.12)}
.sp-card.beauty{background:rgba(180,140,220,.04);border-color:rgba(180,140,220,.12)}
.sp-card.money{background:rgba(212,175,55,.04);border-color:rgba(212,175,55,.12)}
.sp-card.health{background:rgba(100,200,160,.04);border-color:rgba(100,200,160,.12)}
.sp-icon{font-size:1.6rem;margin-bottom:4px}
.sp-title{font-size:.7rem;color:#998877;margin-bottom:4px;letter-spacing:1px}
.sp-desc{font-size:.78rem;font-weight:700;line-height:1.4}
.sp-card.love .sp-desc{color:#E080A0}
.sp-card.beauty .sp-desc{color:#B090D0}
.sp-card.money .sp-desc{color:#D4AF37}
.sp-card.health .sp-desc{color:#70CC99}

/* quote */
.quote-box{
  text-align:center;padding:18px 16px;margin-bottom:14px;
  background:linear-gradient(145deg,rgba(212,175,55,.04),rgba(180,130,60,.02));
  border:1px solid rgba(212,175,55,.1);border-radius:16px;position:relative
}
.quote-mark{font-size:2rem;color:rgba(212,175,55,.12);line-height:1}
.quote-txt{
  font-size:.98rem;font-weight:600;color:#E8D090;letter-spacing:1.5px;
  margin-top:-6px;line-height:1.6
}
.quote-from{font-size:.68rem;color:#665544;margin-top:8px;letter-spacing:1px}

/* share */
.share-btn{
  display:block;width:100%;padding:15px;font-size:.95rem;font-weight:800;
  color:#1a1035;background:linear-gradient(135deg,#D4AF37,#B8860B,#DAA520);
  border:none;border-radius:15px;cursor:pointer;letter-spacing:4px;
  box-shadow:0 4px 20px rgba(212,175,55,.25),0 0 0 1px rgba(212,175,55,.15);
  transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden
}
.share-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,175,55,.4)}
.share-btn:active{transform:translateY(0)}
.share-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  animation:sheen 3s 2s ease infinite
}
@keyframes sheen{0%{left:-100%}30%{left:150%}100%{left:150%}}

/* input area */
.input-area{
  background:rgba(10,8,25,.92);border:1px solid rgba(212,175,55,.1);
  border-radius:18px;padding:20px 18px;margin-bottom:14px
}
.input-area .input-title{
  font-size:.8rem;color:#D4AF37;font-weight:700;letter-spacing:2px;margin-bottom:12px;
  text-align:center
}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row:last-child{margin-bottom:0}
.input-row input{
  flex:1;background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.1);
  border-radius:10px;padding:10px 12px;font-size:.9rem;color:#fff;
  outline:none;text-align:center;transition:border-color .2s
}
.input-row input:focus{border-color:rgba(212,175,55,.4)}
.input-row input::placeholder{color:#554433}
.input-hint{font-size:.62rem;color:#554433;text-align:center;margin-top:8px;letter-spacing:1px}
.go-btn{
  width:100%;padding:12px;margin-top:12px;font-size:.88rem;font-weight:800;
  color:#1a1035;background:linear-gradient(135deg,#D4AF37,#B8860B);
  border:none;border-radius:12px;cursor:pointer;letter-spacing:3px
}
.go-btn:hover{opacity:.92}

.footer{text-align:center;padding:16px 0 8px;font-size:.6rem;color:#332211;letter-spacing:1px}

/* music player */
.music-fab{
  position:fixed;bottom:24px;right:20px;z-index:50;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#D4AF37,#B8860B);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(212,175,55,.35);
  transition:transform .2s,box-shadow .2s
}
.music-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(212,175,55,.5)}
.music-fab .icon{font-size:1.3rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.music-fab.playing .icon{animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.music-panel{
  position:fixed;bottom:82px;right:20px;z-index:50;
  width:280px;background:rgba(13,11,26,.95);
  border:1px solid rgba(212,175,55,.15);border-radius:16px;
  padding:16px;transform:translateY(10px);opacity:0;
  pointer-events:none;transition:all .3s ease;
  backdrop-filter:blur(12px)
}
.music-panel.show{transform:translateY(0);opacity:1;pointer-events:auto}
.music-panel .mp-title{font-size:.78rem;color:#D4AF37;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.music-panel .mp-sub{font-size:.65rem;color:#776655;margin-bottom:10px;line-height:1.5}
.music-panel .mp-mantra{font-size:.72rem;color:#C9A227;letter-spacing:1px;margin-bottom:10px;font-style:italic}

@media(max-width:380px){
  .app{padding:10px 8px 32px}
  .header h1{font-size:1.25rem}
  .mandala-ring{width:90px;height:90px}
  .mandala-center{width:38px;height:38px;font-size:1.1rem}
  .yi-ji{grid-template-columns:1fr}
  .fortune-grid{grid-template-columns:1fr}
  .special-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.min.js"></script>
<script>
// ── Canvas bg ──
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let pts=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;initPts()}
function drawLotus(x,y,sz,rot,alpha,hue){
  cx.save();cx.translate(x,y);cx.rotate(rot);cx.globalAlpha=alpha;
  const petalCount=8;
  for(let i=0;i<petalCount;i++){
    const angle=(Math.PI*2/petalCount)*i;
    cx.save();cx.rotate(angle);
    cx.beginPath();
    cx.ellipse(0,-sz*.6,sz*.28,sz*.65,0,0,Math.PI*2);
    const g=cx.createRadialGradient(0,-sz*.4,0,0,-sz*.4,sz*.65);
    g.addColorStop(0,`hsla(${hue},70%,80%,.9)`);
    g.addColorStop(.6,`hsla(${hue},65%,70%,.7)`);
    g.addColorStop(1,`hsla(${hue},60%,60%,.3)`);
    cx.fillStyle=g;cx.fill();
    cx.restore();
  }
  cx.beginPath();cx.arc(0,0,sz*.18,0,Math.PI*2);
  cx.fillStyle=`hsla(48,80%,70%,${alpha*.9})`;cx.fill();
  cx.restore();
}
function initPts(){
  const n=Math.min(Math.floor(innerWidth/35),32);
  pts=Array.from({length:n},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    sz:18+Math.random()*30,
    vx:(Math.random()-.5)*.15,vy:-.08-Math.random()*.12,
    rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.003,
    a:.08+Math.random()*.18,
    sp:.008+Math.random()*.015,ph:Math.random()*Math.PI*2,
    hue:330+Math.random()*30
  }));
}
function drawBg(){
  cx.clearRect(0,0,cv.width,cv.height);
  for(const p of pts){
    p.ph+=p.sp;
    const pulse=.7+.3*Math.sin(p.ph);
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotSpd;
    if(p.y<-p.sz*2){p.y=cv.height+p.sz*2;p.x=Math.random()*cv.width}
    if(p.x<-p.sz*2)p.x=cv.width+p.sz*2;
    if(p.x>cv.width+p.sz*2)p.x=-p.sz*2;
    drawLotus(p.x,p.y,p.sz*pulse,p.rot,p.a*pulse,p.hue);
  }
  requestAnimationFrame(drawBg);
}
rsz();initPts();drawBg();

// ── Helpers ──
function sRand(s){
  let x=Math.sin(s*9301+49297)%233280;
  return(x-Math.floor(x));
}
function tSeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function pick(a,s){return a[Math.floor(sRand(s)*a.length)]}
function pickN(a,n,s){const r=[],av=[...a];for(let i=0;i<n&&av.length>0;i++){const k=Math.floor(sRand(s+i*131)*av.length);r.push(av.splice(k,1)[0])}return r}
function daysDiff(y1,m1,d1,y2,m2,d2){return Math.floor((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000)}
function fmt(n){return n.toLocaleString('zh-CN')}

function goCalc(){
  const y=parseInt(document.getElementById('by').value);
  const m=parseInt(document.getElementById('bm').value);
  const d=parseInt(document.getElementById('bd').value);
  if(!y||y<1940||y>2020){alert('请输入有效出生年份');return}
  if(!m||m<1||m>12){alert('请输入有效月份');return}
  if(!d||d<1||m===2?d>29:d>31){alert('请输入有效日期');return}
  localStorage.setItem(BK,JSON.stringify({y,m,d}));
  render();
}

function render(){
  document.getElementById('inputArea').style.display='none';
  ['dateCard','lifeSec','hlSec','ftSec','quoteBox','shareBtn'].forEach(id=>{
    document.getElementById(id).style.display='';
  });
  const birth=loadB(),now=new Date(),seed=tSeed();

  // Date card
  const wd=['日','一','二','三','四','五','六'];
  document.getElementById('solarDate').textContent=
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${wd[now.getDay()]}`;

  try{
    const solar=Lunar.Solar.fromYmd(now.getFullYear(),now.getMonth()+1,now.getDate());
    const lunar=solar.getLunar();
    const gzY=lunar.getYearInGanZhiExact(),gzM=lunar.getMonthInGanZhi(),gzD=lunar.getDayInGanZhi();
    const sx=lunar.getYearShengXiao(),lm=lunar.getMonthInChinese(),ld=lunar.getDayInChinese();
    const jq=lunar.getJieQi();

    document.getElementById('lunarRow').innerHTML=
      `<span class="lunar-item">${gzY}年</span>`+
      `<span class="lunar-item">${gzM}月${gzD}日</span>`+
      `<span class="lunar-item tibetan">🕉️ ${sx}年 · ${lm}月${ld}</span>`+
      (jq?`<span class="lunar-item jieqi">节气 · ${jq}</span>`:'');
  }catch(e){
    document.getElementById('lunarRow').innerHTML='<span class="lunar-item">正在连接时轮...</span>';
  }

  // Life progress
  if(birth){
    const lived=daysDiff(birth.y,birth.m,birth.d,now.getFullYear(),now.getMonth()+1,now.getDate());
    const exp=80*365,wStart=22*365,rAge=60*365;
    const wDone=Math.max(0,lived-wStart),toRet=Math.max(0,rAge-lived);
    const pct=Math.min(100,(lived/exp*100)).toFixed(1);

    document.getElementById('lifePct').textContent=pct+'%';
    document.getElementById('lifeFill').style.width=pct+'%';
    document.getElementById('lifePctBar').textContent=pct+'%';
    document.getElementById('dLived').textContent=fmt(lived)+' 天';
    document.getElementById('dWorked').textContent=lived>=wStart?fmt(wDone)+' 天':'—';

function doShare(){
  const yiTxt=[...document.querySelectorAll('#yiList .tag')].slice(0,4).map(e=>e.textContent).join(' ');

  if(navigator.share){navigator.share({title:'时轮运转',text:txt,url:location.href})}else{
    const ta=document.createElement('textarea');ta.value=txt;
    ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');alert('已复制！去小红书粘贴 📋')}catch(e){alert(txt)}
    ta.remove();
  }
}
